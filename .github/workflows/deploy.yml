name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:             
    runs-on: ubuntu-latest
    steps:
      - name: Connect To Tailscale Network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-cd
      
      - name: Run deployment Script
        run: pwd
      

       